# ============================================================================
# KITTY CONFIGURATION - Full Binding Scheme
# ============================================================================

# FONTS & APPEARANCE
# Avalanche OS ships Fedora's jetbrains-mono-fonts (no Nerd patch); standard
# Unicode prompt glyphs (❄ ❯) render fine. Swap to "JetBrains Mono Nerd Font"
# if you install a Nerd-patched build yourself.
font_family      JetBrains Mono
font_size        12
font_weight      medium

# COLORS (Avalanche OS theme)
background       #0a1e2e
foreground       #d4d4d4
cursor           #ff6b35

tab_bar_style    powerline
active_tab_background   #ff6b35
active_tab_foreground   #0a1e2e
inactive_tab_background #1a2a3a
inactive_tab_foreground #888888

window_padding_width 8
enable_ligatures yes
scrollback_lines 5000

background_opacity 0.98

# ============================================================================
# TAB MANAGEMENT
# ============================================================================

# Create new tab
map ctrl+shift+t new_tab

# Close tab
map ctrl+shift+q close_tab

# Navigate tabs
map ctrl+shift+, previous_tab
map ctrl+shift+. next_tab

# Jump to specific tab (1-9)
map ctrl+shift+1 goto_tab 1
map ctrl+shift+2 goto_tab 2
map ctrl+shift+3 goto_tab 3
map ctrl+shift+4 goto_tab 4
map ctrl+shift+5 goto_tab 5
map ctrl+shift+6 goto_tab 6
map ctrl+shift+7 goto_tab 7
map ctrl+shift+8 goto_tab 8
map ctrl+shift+9 goto_tab 9

# Move tab left/right
map ctrl+shift+alt+right move_tab_forward
map ctrl+shift+alt+left move_tab_backward

# ============================================================================
# WINDOW/SPLIT MANAGEMENT
# ============================================================================

# Split horizontally (left/right)
map ctrl+shift+e launch --location=hsplit --cwd=current

# Split vertically (top/bottom)
map ctrl+shift+o launch --location=vsplit --cwd=current

# Close window/split
map ctrl+shift+w close_window

# Toggle fullscreen
map ctrl+shift+f toggle_fullscreen

# ============================================================================
# LAYOUTS
# ============================================================================

# Cycle through layouts
map ctrl+shift+space cycle_layout

# Set specific layout
map ctrl+shift+alt+t goto_layout tall
map ctrl+shift+alt+g goto_layout grid
map ctrl+shift+alt+s goto_layout stack

# ============================================================================
# WINDOW NAVIGATION
# ============================================================================

# Navigate between windows with arrow keys
map ctrl+shift+up    neighboring_window up
map ctrl+shift+down  neighboring_window down
map ctrl+shift+left  neighboring_window left
map ctrl+shift+right neighboring_window right

# Alternative: HJKL (vim-style)
# map ctrl+shift+h neighboring_window left
# map ctrl+shift+j neighboring_window down
# map ctrl+shift+k neighboring_window up
# map ctrl+shift+l neighboring_window right

# ============================================================================
# WINDOW RESIZING
# ============================================================================

# Resize windows (hold and press multiple times)
map ctrl+shift+alt+up    resize_window taller
map ctrl+shift+alt+down  resize_window shorter
map ctrl+shift+alt+left  resize_window narrower
map ctrl+shift+alt+right resize_window wider


# ============================================================================
# COPY/PASTE & SELECTION
# ============================================================================

# Copy to clipboard
map ctrl+shift+c copy_to_clipboard

# Paste from clipboard
map ctrl+shift+v paste_from_clipboard

# ============================================================================
# SCROLLBACK
# ============================================================================

# Scroll up/down
map ctrl+shift+page_up scroll_page_up
map ctrl+shift+page_down scroll_page_down

# Show last screen
map ctrl+shift+e show_last_command_output

# ============================================================================
# MISC
# ============================================================================

# Reload config
map ctrl+shift+f5 load_config_file

# Open URL in browser (hover over URL and press)
map ctrl+shift+u open_url_by_program default

# Increment/Decrease font size
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0

# Reset font size
map ctrl+shift+backspace change_font_size all 0
